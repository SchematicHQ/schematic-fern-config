<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 870" width="1100" height="870" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#AAAACC"/>
    </marker>
  </defs>

  <rect width="1100" height="870" fill="#FFFFFF"/>

  <!-- Legend -->
  <rect x="15" y="15" width="205" height="74" rx="8" fill="#FAFAFA" stroke="#E4DEFA" stroke-width="1.5"/>
  <text x="117" y="35" text-anchor="middle" font-size="12" font-weight="600" fill="#14002D">Scope</text>
  <rect x="30" y="46" width="14" height="14" rx="3" fill="#EDE9FE" stroke="#9563FF" stroke-width="1.5"/>
  <text x="52" y="58" font-size="11" fill="#4C1D95">Account-scoped</text>
  <rect x="30" y="68" width="14" height="14" rx="3" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="1.5"/>
  <text x="52" y="80" font-size="11" fill="#0C4A6E">Environment-scoped</text>

  <!-- ═══════════ CONNECTION LINES ═══════════ -->

  <!-- ACCOUNT → ENVIRONMENT -->
  <path d="M 550,67 C 550,110 140,110 140,163" fill="none" stroke="#AAAACC" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="330" y="100" text-anchor="middle" font-size="10" fill="#8080AA">has-many</text>

  <!-- ACCOUNT → PLAN -->
  <line x1="550" y1="67" x2="550" y2="163" stroke="#AAAACC" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="565" y="118" font-size="10" fill="#8080AA">has-many</text>

  <!-- ACCOUNT → FEATURE -->
  <path d="M 635,45 C 790,45 910,85 910,163" fill="none" stroke="#AAAACC" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="790" y="35" text-anchor="middle" font-size="10" fill="#8080AA">has-many</text>

  <!-- ENVIRONMENT → COMPANY -->
  <line x1="140" y1="207" x2="140" y2="343" stroke="#AAAACC" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="105" y="278" font-size="10" fill="#8080AA">has-many</text>

  <!-- ENVIRONMENT → USER -->
  <path d="M 140,207 C 140,265 395,265 395,263" fill="none" stroke="#AAAACC" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="268" y="255" text-anchor="middle" font-size="10" fill="#8080AA">has-many</text>

  <!-- COMPANY → COMPANY-PLAN -->
  <line x1="140" y1="387" x2="105" y2="473" stroke="#AAAACC" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="96" y="430" font-size="10" fill="#8080AA">has-many</text>

  <!-- COMPANY → COMPANY-MEMBERSHIP -->
  <path d="M 225,365 C 270,365 310,415 310,473" fill="none" stroke="#AAAACC" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="282" y="406" font-size="10" fill="#8080AA">has-many</text>

  <!-- COMPANY → COMPANY-OVERRIDE -->
  <path d="M 140,387 C 140,445 445,445 445,473" fill="none" stroke="#AAAACC" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="300" y="458" text-anchor="middle" font-size="10" fill="#8080AA">has-many</text>

  <!-- USER → COMPANY-MEMBERSHIP -->
  <line x1="395" y1="307" x2="310" y2="473" stroke="#AAAACC" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="363" y="393" font-size="10" fill="#8080AA">has-many</text>

  <!-- PLAN → COMPANY-PLAN (long curve) -->
  <path d="M 465,185 C 310,185 105,360 105,473" fill="none" stroke="#AAAACC" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="260" y="230" text-anchor="middle" font-size="10" fill="#8080AA">has-many</text>

  <!-- PLAN → COMPANY-OVERRIDE -->
  <path d="M 550,207 C 550,365 530,415 530,473" fill="none" stroke="#AAAACC" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="556" y="352" font-size="10" fill="#8080AA">has-many</text>

  <!-- PLAN → PLAN-ENTITLEMENT -->
  <path d="M 635,185 C 770,185 880,275 880,343" fill="none" stroke="#AAAACC" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="775" y="172" text-anchor="middle" font-size="10" fill="#8080AA">has-many</text>

  <!-- FEATURE → FLAG -->
  <line x1="910" y1="207" x2="730" y2="343" stroke="#AAAACC" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="832" y="266" text-anchor="middle" font-size="10" fill="#8080AA">has-many</text>

  <!-- FEATURE → PLAN-ENTITLEMENT (right side curve) -->
  <path d="M 995,185 C 1060,185 1050,270 1050,343" fill="none" stroke="#AAAACC" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="1058" y="262" font-size="10" fill="#8080AA">has-many</text>

  <!-- FLAG → RULE -->
  <line x1="730" y1="387" x2="730" y2="543" stroke="#AAAACC" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="748" y="468" font-size="10" fill="#8080AA">has-one</text>

  <!-- PLAN-ENTITLEMENT → RULE -->
  <path d="M 965,387 C 965,465 815,510 815,543" fill="none" stroke="#AAAACC" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="912" y="468" text-anchor="middle" font-size="10" fill="#8080AA">has-one</text>

  <!-- COMPANY-OVERRIDE → RULE -->
  <path d="M 530,517 C 530,548 645,548 645,565" fill="none" stroke="#AAAACC" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="568" y="544" font-size="10" fill="#8080AA">has-one</text>

  <!-- RULE → CONDITION-GROUP -->
  <line x1="730" y1="587" x2="730" y2="663" stroke="#AAAACC" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="748" y="628" font-size="10" fill="#8080AA">has-many</text>

  <!-- CONDITION-GROUP → CONDITION -->
  <line x1="730" y1="707" x2="730" y2="778" stroke="#AAAACC" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="748" y="745" font-size="10" fill="#8080AA">has-many</text>

  <!-- CONDITION-GROUP self-referential -->
  <path d="M 645,685 C 592,685 592,697 645,697" fill="none" stroke="#AAAACC" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="556" y="695" text-anchor="middle" font-size="10" fill="#8080AA">has-many</text>

  <!-- ═══════════ ENTITY BOXES ═══════════ -->

  <!-- ACCOUNT -->
  <rect x="465" y="23" width="170" height="44" rx="7" fill="#EDE9FE" stroke="#9563FF" stroke-width="2"/>
  <text x="550" y="45" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#4C1D95">ACCOUNT</text>

  <!-- ENVIRONMENT -->
  <rect x="55" y="163" width="170" height="44" rx="7" fill="#EDE9FE" stroke="#9563FF" stroke-width="2"/>
  <text x="140" y="185" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#4C1D95">ENVIRONMENT</text>

  <!-- USER (environment-scoped) -->
  <rect x="310" y="263" width="170" height="44" rx="7" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="2"/>
  <text x="395" y="285" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#0C4A6E">USER</text>

  <!-- PLAN (account-scoped) -->
  <rect x="465" y="163" width="170" height="44" rx="7" fill="#EDE9FE" stroke="#9563FF" stroke-width="2"/>
  <text x="550" y="185" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#4C1D95">PLAN</text>

  <!-- FEATURE (account-scoped) -->
  <rect x="825" y="163" width="170" height="44" rx="7" fill="#EDE9FE" stroke="#9563FF" stroke-width="2"/>
  <text x="910" y="185" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#4C1D95">FEATURE</text>

  <!-- COMPANY (environment-scoped) -->
  <rect x="55" y="343" width="170" height="44" rx="7" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="2"/>
  <text x="140" y="365" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#0C4A6E">COMPANY</text>

  <!-- COMPANY-PLAN (environment-scoped) -->
  <rect x="20" y="473" width="170" height="44" rx="7" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="2"/>
  <text x="105" y="495" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#0C4A6E">COMPANY-PLAN</text>

  <!-- COMPANY-MEMBERSHIP (environment-scoped) -->
  <rect x="225" y="473" width="170" height="44" rx="7" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="2"/>
  <text x="310" y="495" text-anchor="middle" dominant-baseline="middle" font-size="10" font-weight="700" fill="#0C4A6E">COMPANY-MEMBERSHIP</text>

  <!-- COMPANY-OVERRIDE (environment-scoped) -->
  <rect x="445" y="473" width="170" height="44" rx="7" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="2"/>
  <text x="530" y="495" text-anchor="middle" dominant-baseline="middle" font-size="10" font-weight="700" fill="#0C4A6E">COMPANY-OVERRIDE</text>

  <!-- FLAG (account-scoped) -->
  <rect x="645" y="343" width="170" height="44" rx="7" fill="#EDE9FE" stroke="#9563FF" stroke-width="2"/>
  <text x="730" y="365" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#4C1D95">FLAG</text>

  <!-- PLAN-ENTITLEMENT (environment-scoped) -->
  <rect x="880" y="343" width="170" height="44" rx="7" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="2"/>
  <text x="965" y="365" text-anchor="middle" dominant-baseline="middle" font-size="10" font-weight="700" fill="#0C4A6E">PLAN-ENTITLEMENT</text>

  <!-- RULE (environment-scoped) -->
  <rect x="645" y="543" width="170" height="44" rx="7" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="2"/>
  <text x="730" y="565" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#0C4A6E">RULE</text>

  <!-- CONDITION-GROUP (environment-scoped) -->
  <rect x="645" y="663" width="170" height="44" rx="7" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="2"/>
  <text x="730" y="685" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#0C4A6E">CONDITION-GROUP</text>

  <!-- CONDITION (environment-scoped) -->
  <rect x="645" y="778" width="170" height="44" rx="7" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="2"/>
  <text x="730" y="800" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="#0C4A6E">CONDITION</text>

</svg>
